name: Refresh market signals

on:
  schedule:
    # 8 AM EST, 4 PM EST, midnight EST (in UTC: 13, 21, 05)
    - cron: '0 13,21,5 * * *'
  workflow_dispatch:  # also allow manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-signals.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update market signals $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit"
          fi
